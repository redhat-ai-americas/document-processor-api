apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: docling-serve
  labels:
    app.kubernetes.io/name: docling-serve
    app.kubernetes.io/part-of: docling-serve
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: docling
    server: https://kubernetes.default.svc
  source:
    path: docling-serve/helm
    repoURL: https://github.com/redhat-ai-americas/document-processor-api.git
    targetRevision: HEAD
    helm:
      values: ''
      valueFiles:
        - values.yaml
  sources: []
  project: default
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
